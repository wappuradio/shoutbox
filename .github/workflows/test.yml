name: ci

on:
  push:
    branches:
      - "master"
      - "node24"

jobs:
  build:
    runs-on: actions-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: build-action
        uses: ./.github/build-action
        with:
          registry_username: ${{ github.actor }}
          registry_password: ${{ github.token }}

